<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/mobile-enhancements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <span class="nav-corner nav-corner-tl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-tr" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-bl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-br" aria-hidden="true"></span>
        <div class="navbar-container">
            <button class="mobile-menu-toggle" aria-label="Open navigation menu">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="navbar-brand">
                <span class="navbar-tagline">GOURMET GROCERIES</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Products</a></li>
                <li id="admin-link" class="hidden"><a href="/admin">Admin</a></li>
            </ul>
            <div class="navbar-actions">
                <div id="auth-buttons"><a href="/login" class="btn btn-secondary btn-sm">Login</a></div>
                <div id="user-menu" class="hidden flex gap-2" style="align-items: center;">
                    <a href="/cart" class="icon-button"><i class="fas fa-shopping-cart"></i><span id="cart-badge" class="cart-badge hidden">0</span></a>
                    <div class="account-menu">
                        <button id="account-toggle" class="icon-button" title="Account">
                            <i class="fas fa-user-circle"></i>
                        </button>
                                                <div id="account-dropdown" class="account-dropdown hidden">
                            <div class="accd-header">
                                <div class="accd-avatar" id="account-avatar">U</div>
                                <div class="accd-user">
                                    <div class="accd-name" id="account-display-name">User</div>
                                    <div class="accd-role" id="account-display-role">Member</div>
                                </div>
                            </div>
                            <div class="accd-group">
                                <button class="accd-item" onclick="openProfileModal()">
                                    <span class="accd-icon"><i class="fas fa-user-edit"></i></span>Edit Profile
                                </button>
                                <a href="/orders" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-box-open"></i></span>My Orders
                                </a>
                                <button class="accd-item" onclick="openAccountManagementModal()">
                                    <span class="accd-icon"><i class="fas fa-key"></i></span>Change Password
                                </button>
                            </div>
                            <div class="accd-group">
                                <button id="theme-toggle" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-moon"></i></span>Switch to Dark Mode
                                </button>
                            </div>
                            <div class="accd-group accd-group-last">
                                <button id="account-logout" class="accd-item accd-item-danger">
                                    <span class="accd-icon"><i class="fas fa-sign-out-alt"></i></span>Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="container">
        <div class="section-title">
            <h2 style="font-size: 3rem; line-height: 1;">
                <i class="fas fa-shopping-bag"></i>
            </h2>
        </div>
        <div id="orders-list" class="orders-list"></div>

        <div style="margin-top: 2.5rem;">
            <h3 style="margin-bottom: 1rem; display:flex; align-items:center; gap: 0.5rem; color: var(--primary);">
                <i class="fas fa-undo-alt"></i> My Returns
            </h3>
            <div id="returns-list" class="orders-list"></div>
        </div>
    </section>

    <style>
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .order-header-left {
            min-width: 0;
        }

        .order-header-right {
            text-align: right;
        }

        .order-status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.9rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .order-status-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .order-status-processing,
        .order-status-shipped {
            background: var(--info-bg);
            color: var(--info);
        }

        .order-status-delivered {
            background: var(--success-bg);
            color: var(--success);
        }

        .order-status-cancelled {
            background: var(--error-bg);
            color: var(--error);
        }

        @media (max-width: 600px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .order-header-right {
                text-align: left;
            }
        }

        .return-status-badge {
            display: inline-flex; align-items: center; padding: 0.3rem 0.75rem;
            border-radius: 9999px; font-size: 0.78rem; font-weight: 600;
        }
        .return-status-requested { background: var(--warning-bg, #fff3cd); color: var(--warning, #d97706); }
        .return-status-approved  { background: var(--info-bg, #cfe2ff); color: var(--info, #3b82f6); }
        .return-status-received  { background: var(--primary-bg, #d1f5e0); color: var(--primary, #1a4731); }
        .return-status-refunded  { background: var(--success-bg, #d1fae5); color: var(--success, #10b981); }
        .return-status-rejected  { background: var(--error-bg, #fee2e2); color: var(--error, #ef4444); }

        .return-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9999;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .return-modal {
            background: #fff; border-radius: 12px; max-width: 520px; width: 100%;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .return-modal-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border, #e5e7eb);
            display: flex; justify-content: space-between; align-items: center;
        }
        .return-modal-header h3 { margin: 0; font-size: 1.1rem; }
        .return-modal-body { padding: 1.25rem 1.5rem; }
        .return-modal-footer {
            padding: 1rem 1.5rem; border-top: 1px solid var(--border, #e5e7eb);
            display: flex; justify-content: flex-end; gap: 0.75rem;
        }
        .return-item-check { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid var(--border, #e5e7eb); }
        .return-item-check:last-child { border-bottom: none; }

        /* account dropdown styles moved to styles.css */
    </style>

    <script src="/js/main.js"></script>
    <script>
        let ordersRefreshInterval = null;
        let _ordersCache = [];

        function getReturnStatusText(status) {
            const map = { requested:'Return Requested', approved:'Return Approved', received:'Products Received', refunded:'Refunded', rejected:'Return Rejected' };
            return map[status] || status;
        }

        function getCustomerOrderStatusText(status) {
            if (!status) return 'Order Pending';
            switch (status) {
                case 'pending':
                    return 'Order Pending';
                case 'processing':
                    return 'Order Confirmed';
                case 'shipped':
                    return 'Shipped';
                case 'delivered':
                    return 'Delivered';
                case 'cancelled':
                    return 'Rejected by owner';
                default:
                    return status;
            }
        }

        function getCustomerOrderStatusClass(status) {
            switch (status) {
                case 'pending':
                    return 'order-status-badge order-status-pending';
                case 'processing':
                    return 'order-status-badge order-status-processing';
                case 'shipped':
                    return 'order-status-badge order-status-shipped';
                case 'delivered':
                    return 'order-status-badge order-status-delivered';
                case 'cancelled':
                    return 'order-status-badge order-status-cancelled';
                default:
                    return 'order-status-badge';
            }
        }

        function getRefundDisplay(order) {
            const provider = String(order.payment_provider || '').toLowerCase();
            const paymentStatus = String(order.payment_status || '').toLowerCase();
            const refundStatus = String(order.refund_status || '').toLowerCase();

            if (provider !== 'razorpay') return '';

            if (refundStatus === 'refunded' || paymentStatus === 'refunded') {
                return '<span style="color: var(--success); font-weight: 700;">Refunded</span>';
            }

            if (refundStatus === 'refund_pending' || paymentStatus === 'refund_pending') {
                return '<span style="color: var(--warning); font-weight: 700;">Refund pending</span>';
            }

            if (refundStatus === 'refund_failed') {
                return '<span style="color: var(--error); font-weight: 700;">Refund failed (contact support)</span>';
            }

            if (paymentStatus === 'paid') {
                return '<span style="color: var(--info); font-weight: 700;">Paid</span>';
            }

            return '';
        }

        function canCustomerCancel(order) {
            const status = String(order.status || '').toLowerCase();
            return status === 'pending' || status === 'processing';
        }

        async function cancelOrder(orderId) {
            if (!orderId) return;
            const ok = await showConfirmDialog('Cancel this order? If it was paid by UPI/GPay, the refund will be initiated back to your bank account.', {
                title: 'Cancel Order',
                confirmText: 'Cancel Order',
                cancelText: 'Keep Order'
            });
            if (!ok) return;

            try {
                const resp = await api.post(`/orders/${orderId}/cancel`, { reason: 'Customer cancelled' });
                showAlert(resp.message || 'Order cancelled', 'success');
                await loadOrders();
            } catch (err) {
                console.error('Cancel order failed:', err);
                showAlert(err.message || 'Failed to cancel order', 'error');
            }
        }

        async function loadOrders() {
            const data = await api.get('/orders');
            _ordersCache = data.orders || [];
            const container = document.getElementById('orders-list');
            
            if (!data.orders || data.orders.length === 0) {
                container.innerHTML = '<div class="card"><div class="card-content text-center"><p>You have no orders yet</p><a href="/products" class="btn btn-primary mt-2">Start Shopping</a></div></div>';
                return;
            }
            
            container.innerHTML = data.orders.map(order => `
                <div class="card">
                    <div class="card-content">
                        <div class="order-header" style="margin-bottom: 1rem;">
                            <div class="order-header-left">
                                <strong>Order #${order.order_number}</strong>
                                <p style="color: var(--text-light); margin-top: 0.25rem;">${formatDate(order.created_at)}</p>
                            </div>
                            <div class="order-header-right">
                                <span class="${getCustomerOrderStatusClass(order.status)}">${getCustomerOrderStatusText(order.status)}</span>
                                <p style="margin-top: 0.5rem; font-size: 1.25rem; font-weight: 700; color: var(--primary);">${formatCurrency(order.total_amount)}</p>
                            </div>
                        </div>
                        <div style="border-top: 1px solid var(--border); padding-top: 1rem;">
                            <p style="margin: 0 0 0.5rem; font-weight: 600; color: var(--primary);">
                                Status: <span class="${getCustomerOrderStatusClass(order.status)}" style="margin-left: 0.25rem;">${getCustomerOrderStatusText(order.status)}</span>
                            </p>
                            ${getRefundDisplay(order) ? `
                                <p style="margin: 0 0 0.75rem; color: var(--text-light);">
                                    Payment/Refund: ${getRefundDisplay(order)}
                                </p>
                            ` : ''}
                            <strong style="display: block; margin-bottom: 0.5rem;">Items:</strong>
                            ${order.items.map(item => `<div style="display: flex; justify-content: space-between; padding: 0.5rem 0;"><span>${item.product_name} x ${item.quantity}</span><span>${formatCurrency(item.subtotal)}</span></div>`).join('')}

                            ${canCustomerCancel(order) ? `
                                <div style="margin-top: 1rem; display:flex; justify-content:flex-end; gap:0.5rem;">
                                    <button class="btn btn-danger btn-sm" onclick="cancelOrder(${order.id})">
                                        <i class="fas fa-times"></i> Cancel Order
                                    </button>
                                </div>
                            ` : ''}
                            ${order.status === 'delivered' ? `
                                <div style="margin-top: 1rem; display:flex; justify-content:flex-end; gap:0.5rem;">
                                    <button class="btn btn-secondary btn-sm" onclick="openReturnModal(${order.id})" style="border-color:var(--warning);color:var(--warning);">
                                        <i class="fas fa-undo-alt"></i> Return Products
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ── Return Products Functions ──────────────────────────────
        function openReturnModal(orderId) {
            const order = _ordersCache.find(o => o.id === orderId);
            if (!order || order.status !== 'delivered') return;

            const items = order.items || [];
            const itemsHtml = items.map(item => `
                <label class="return-item-check">
                    <input type="checkbox" class="return-item-cb" data-order-item-id="${item.id}" data-quantity="${item.quantity}" checked>
                    <div style="flex:1;">
                        <div style="font-weight:600;">${item.product_name}</div>
                        <div style="color:var(--text-light);font-size:0.85rem;">Qty: ${item.quantity} &times; ${formatCurrency(item.price || item.subtotal / item.quantity)}</div>
                    </div>
                    <span style="font-weight:600;">${formatCurrency(item.subtotal)}</span>
                </label>
            `).join('');

            const modal = document.createElement('div');
            modal.className = 'return-modal-overlay';
            modal.id = 'return-modal';
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="return-modal">
                    <div class="return-modal-header">
                        <h3><i class="fas fa-undo-alt" style="color:var(--warning);"></i> Return Products</h3>
                        <button onclick="document.getElementById('return-modal').remove()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-light);">&times;</button>
                    </div>
                    <div class="return-modal-body">
                        <p style="margin:0 0 0.5rem;color:var(--text-light);font-size:0.9rem;">Order <strong>#${order.order_number}</strong></p>
                        <p style="margin:0 0 1rem;font-size:0.88rem;">Select items you want to return:</p>
                        <div id="return-items-list">${itemsHtml}</div>
                        <div style="margin-top:1rem;">
                            <label style="display:block;font-weight:600;margin-bottom:0.35rem;">Reason for Return</label>
                            <textarea id="return-reason" rows="3" style="width:100%;padding:0.75rem;border:1px solid var(--border,#e5e7eb);border-radius:8px;font-size:0.95rem;resize:vertical;" placeholder="Please describe why you want to return these products..."></textarea>
                        </div>
                    </div>
                    <div class="return-modal-footer">
                        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('return-modal').remove()">Cancel</button>
                        <button class="btn btn-primary btn-sm" onclick="submitReturnRequest(${orderId})" id="return-submit-btn">
                            <i class="fas fa-paper-plane"></i> Submit Return
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function submitReturnRequest(orderId) {
            const reason = (document.getElementById('return-reason').value || '').trim();
            if (!reason) {
                showAlert('Please provide a reason for the return.', 'error');
                return;
            }

            const checkboxes = document.querySelectorAll('.return-item-cb:checked');
            if (!checkboxes.length) {
                showAlert('Please select at least one item to return.', 'error');
                return;
            }

            const items = [];
            checkboxes.forEach(cb => {
                items.push({
                    order_item_id: parseInt(cb.dataset.orderItemId),
                    quantity: parseInt(cb.dataset.quantity)
                });
            });

            const btn = document.getElementById('return-submit-btn');
            if (btn) btn.disabled = true;

            try {
                const resp = await api.post('/returns', { order_id: orderId, reason, items });
                showAlert(resp.message || 'Return request submitted!', 'success');
                const modal = document.getElementById('return-modal');
                if (modal) modal.remove();
                await loadMyReturns();
            } catch (err) {
                showAlert(err.message || 'Failed to submit return request.', 'error');
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        async function loadMyReturns() {
            const container = document.getElementById('returns-list');
            try {
                const resp = await api.get('/returns');
                const returns = resp.returns || [];

                if (!returns.length) {
                    container.innerHTML = '<div class="card"><div class="card-content text-center" style="color:var(--text-light);"><p>No return requests yet</p></div></div>';
                    return;
                }

                container.innerHTML = returns.map(r => {
                    const items = (r.items || []).filter(i => i.id);
                    return `
                        <div class="card">
                            <div class="card-content">
                                <div class="order-header" style="margin-bottom:1rem;">
                                    <div class="order-header-left">
                                        <strong>Return RET-${r.id}</strong>
                                        <p style="color:var(--text-light);margin-top:0.25rem;">Order #${r.order_number || r.order_id} &bull; ${formatDate(r.created_at)}</p>
                                    </div>
                                    <div class="order-header-right">
                                        <span class="return-status-badge return-status-${r.status}">${getReturnStatusText(r.status)}</span>
                                        <p style="margin-top:0.5rem;font-size:1.15rem;font-weight:700;color:var(--primary);">₹${parseFloat(r.refund_amount || 0).toFixed(2)}</p>
                                    </div>
                                </div>
                                <div style="border-top:1px solid var(--border);padding-top:1rem;">
                                    <strong style="display:block;margin-bottom:0.4rem;">Returned Items:</strong>
                                    ${items.map(i => `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;"><span>${i.product_name || 'Product'} x${i.quantity}</span><span>₹${parseFloat(i.price * i.quantity).toFixed(2)}</span></div>`).join('')}
                                    <div style="margin-top:0.75rem;color:var(--text-light);font-size:0.88rem;">
                                        <strong>Reason:</strong> ${r.reason || '—'}
                                    </div>
                                    ${r.admin_notes ? `<div style="margin-top:0.4rem;color:var(--text-light);font-size:0.88rem;"><strong>Admin Notes:</strong> ${r.admin_notes}</div>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<div class="card"><div class="card-content text-center" style="color:var(--text-light);"><p>Could not load returns</p></div></div>';
            }
        }

        // ──────────────────────────────────────────

        function startOrdersAutoRefresh() {
            if (ordersRefreshInterval) return;

            const refreshDelay = window.performanceTuning
                ? window.performanceTuning.getAdaptiveInterval(15000, {
                    lowMultiplier: 2,
                    highMultiplier: 0.75,
                    min: 10000,
                    max: 45000
                })
                : 15000;

            ordersRefreshInterval = setInterval(() => {
                loadOrders().catch(err => console.error('Auto-refresh orders error:', err));
            }, refreshDelay);
        }

        window.addEventListener('beforeunload', () => {
            if (ordersRefreshInterval) {
                clearInterval(ordersRefreshInterval);
                ordersRefreshInterval = null;
            }
        });

        (async () => {
            const user = await auth.checkAuth();

            if (!user) {
                const redirect = encodeURIComponent('/orders');
                window.location.href = `/login?redirect=${redirect}`;
            } else {
                await loadOrders();                await loadMyReturns();                startOrdersAutoRefresh();
            }

            // Account dropdown toggle
            const accountToggle = document.getElementById('account-toggle');
            const accountDropdown = document.getElementById('account-dropdown');

            if (accountToggle && accountDropdown) {
                accountToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    accountDropdown.classList.toggle('hidden');
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.account-menu')) {
                        accountDropdown.classList.add('hidden');
                    }
                });
            }

            // Account logout handler
            const accountLogout = document.getElementById('account-logout');
            if (accountLogout) {
                accountLogout.addEventListener('click', async () => {
                    if (await showConfirmDialog('Are you sure you want to logout?', { title: 'Logout', confirmText: 'Logout' })) {
                        await auth.logout();
                    }
                });
            }
        })();
    </script>
</body>
</html>
