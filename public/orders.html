<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/mobile-enhancements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <span class="nav-corner nav-corner-tl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-tr" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-bl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-br" aria-hidden="true"></span>
        <div class="navbar-container">
            <button class="mobile-menu-toggle" aria-label="Open navigation menu">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="navbar-brand">
                <span class="navbar-tagline">GOURMET GROCERIES</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Products</a></li>
                <li id="admin-link" class="hidden"><a href="/admin">Admin</a></li>
            </ul>
            <div class="navbar-actions">
                <div id="auth-buttons"><a href="/login" class="btn btn-secondary btn-sm">Login</a></div>
                <div id="user-menu" class="hidden flex gap-2" style="align-items: center;">
                    <a href="/cart" class="icon-button"><i class="fas fa-shopping-cart"></i><span id="cart-badge" class="cart-badge hidden">0</span></a>
                    <div class="account-menu">
                        <button id="account-toggle" class="icon-button" title="Account">
                            <i class="fas fa-user-circle"></i>
                        </button>
                                                <div id="account-dropdown" class="account-dropdown hidden">
                            <div class="accd-header">
                                <div class="accd-avatar" id="account-avatar">U</div>
                                <div class="accd-user">
                                    <div class="accd-name" id="account-display-name">User</div>
                                    <div class="accd-role" id="account-display-role">Member</div>
                                </div>
                            </div>
                            <div class="accd-group">
                                <button class="accd-item" onclick="openProfileModal()">
                                    <span class="accd-icon"><i class="fas fa-user-edit"></i></span>Edit Profile
                                </button>
                                <a href="/orders" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-box-open"></i></span>My Orders
                                </a>
                                <a href="/returns" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-undo-alt"></i></span>My Returns
                                </a>
                                <button class="accd-item" onclick="openAccountManagementModal()">
                                    <span class="accd-icon"><i class="fas fa-key"></i></span>Change Password
                                </button>
                            </div>
                            <div class="accd-group">
                                <button id="theme-toggle" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-moon"></i></span>Switch to Dark Mode
                                </button>
                            </div>
                            <div class="accd-group accd-group-last">
                                <button id="account-logout" class="accd-item accd-item-danger">
                                    <span class="accd-icon"><i class="fas fa-sign-out-alt"></i></span>Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="container">
        <div class="section-title">
            <h2 style="font-size: 3rem; line-height: 1;">
                <i class="fas fa-shopping-bag"></i>
            </h2>
        </div>
        <div id="orders-list" class="orders-list"></div>
    </section>

    <style>
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .order-header-left {
            min-width: 0;
        }

        .order-header-right {
            text-align: right;
        }

        .order-status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.9rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .order-status-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .order-status-processing,
        .order-status-shipped {
            background: var(--info-bg);
            color: var(--info);
        }

        .order-status-delivered {
            background: var(--success-bg);
            color: var(--success);
        }

        .order-status-cancelled {
            background: var(--error-bg);
            color: var(--error);
        }

        /* ── Delivery Stepper ─────────────────────────── */
        .delivery-stepper {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin: 1.25rem 0 0.75rem;
            position: relative;
        }
        .delivery-stepper::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            height: 3px;
            background: var(--border, #e5e7eb);
            z-index: 0;
        }
        .ds-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            z-index: 1;
            flex: 1;
            font-size: 0.74rem;
            font-weight: 600;
            color: var(--text-light, #94a3b8);
            text-align: center;
        }
        .ds-step-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            border: 3px solid var(--border, #e5e7eb);
            background: var(--bg-primary, #fff);
            color: var(--text-light, #94a3b8);
            transition: all 0.25s;
        }
        .ds-step.done .ds-step-icon {
            border-color: var(--success, #10b981);
            background: var(--success, #10b981);
            color: #fff;
        }
        .ds-step.active .ds-step-icon {
            border-color: var(--primary, #1a4731);
            background: var(--primary, #1a4731);
            color: #fff;
        }
        .ds-step.done { color: var(--success, #10b981); }
        .ds-step.active { color: var(--primary, #1a4731); font-weight: 700; }
        .ds-step.done .ds-step-label { color: var(--success, #10b981); }
        .ds-step.active .ds-step-label { color: var(--primary, #1a4731); }
        .ds-progress {
            position: absolute;
            top: 18px;
            left: 18px;
            height: 3px;
            background: var(--primary, #1a4731);
            z-index: 0;
            transition: width 0.4s ease;
        }

        /* ── Tracking Card ─────────────────────────── */
        .tracking-card {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            padding: 0.85rem 1rem;
            background: #f0fdf8;
            border: 1.5px solid var(--success, #10b981);
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.88rem;
        }
        .tracking-card-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--success, #10b981);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .tracking-card-body { flex: 1; min-width: 0; }
        .tracking-card-label { font-weight: 700; margin-bottom: 0.25rem; color: #065f46; }
        .tracking-card-row { color: var(--text-primary, #1e293b); margin-bottom: 0.15rem; }
        .tracking-card-row span { font-weight: 600; }
        .tracking-card-link {
            display: inline-flex; align-items: center; gap: 0.3rem;
            color: var(--primary, #1a4731); font-weight: 600; text-decoration: none;
            margin-top: 0.35rem;
        }
        .tracking-card-link:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .order-header-right {
                text-align: left;
            }
        }

        /* ── Return Modal ─────────────────────────── */
        .return-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            animation: rmFadeIn .2s ease;
        }
        @keyframes rmFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes rmSlideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        .return-modal {
            background: var(--bg-primary, #fff); border-radius: 16px; max-width: 560px; width: 100%;
            max-height: 92vh; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.22);
            animation: rmSlideUp .3s ease;
        }
        .return-modal-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border, #e5e7eb);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--bg-primary, #fff); z-index: 1; border-radius: 16px 16px 0 0;
        }
        .return-modal-header h3 { margin: 0; font-size: 1.15rem; display: flex; align-items: center; gap: 0.5rem; }
        .return-modal-body { padding: 1.25rem 1.5rem; }
        .return-modal-footer {
            padding: 1rem 1.5rem; border-top: 1px solid var(--border, #e5e7eb);
            display: flex; justify-content: flex-end; gap: 0.75rem;
            position: sticky; bottom: 0; background: var(--bg-primary, #fff); border-radius: 0 0 16px 16px;
        }
        .return-modal-close {
            background: none; border: none; font-size: 1.5rem; cursor: pointer;
            color: var(--text-light); width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; transition: background .15s;
        }
        .return-modal-close:hover { background: var(--bg-secondary, #f1f5f9); }

        /* Stepper */
        .rm-stepper { display: flex; align-items: center; gap: 0; margin-bottom: 1.5rem; }
        .rm-step {
            display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 600;
            color: var(--text-light, #94a3b8); transition: color .2s;
        }
        .rm-step.active { color: var(--primary, #1a4731); }
        .rm-step.done { color: var(--success, #10b981); }
        .rm-step-num {
            width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; border: 2px solid var(--border, #e5e7eb); background: var(--bg-primary, #fff); transition: all .2s;
        }
        .rm-step.active .rm-step-num { border-color: var(--primary, #1a4731); background: var(--primary, #1a4731); color: #fff; }
        .rm-step.done .rm-step-num { border-color: var(--success, #10b981); background: var(--success, #10b981); color: #fff; }
        .rm-step-line { flex: 1; height: 2px; background: var(--border, #e5e7eb); margin: 0 0.5rem; transition: background .2s; }
        .rm-step-line.done { background: var(--success, #10b981); }

        /* Item Selection */
        .return-item-check {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 10px;
            border: 2px solid var(--border, #e5e7eb); margin-bottom: 0.5rem; cursor: pointer; transition: all .15s;
        }
        .return-item-check:hover { border-color: var(--primary, #1a4731); background: rgba(26,71,49,0.02); }
        .return-item-check.selected { border-color: var(--primary, #1a4731); background: rgba(26,71,49,0.04); }
        .return-item-check input[type="checkbox"] { accent-color: var(--primary, #1a4731); width: 18px; height: 18px; cursor: pointer; }

        /* Reason Options */
        .rm-reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
        .rm-reason-option {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem 0.85rem;
            border: 2px solid var(--border, #e5e7eb); border-radius: 10px; cursor: pointer;
            font-size: 0.85rem; transition: all .15s; background: var(--bg-primary, #fff);
        }
        .rm-reason-option:hover { border-color: var(--primary, #1a4731); }
        .rm-reason-option.selected { border-color: var(--primary, #1a4731); background: rgba(26,71,49,0.04); font-weight: 600; }
        .rm-reason-option i { font-size: 1rem; color: var(--text-light); transition: color .15s; }
        .rm-reason-option.selected i { color: var(--primary, #1a4731); }
        .rm-reason-option input { display: none; }

        /* Condition Options */
        .rm-condition-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
        .rm-condition-option {
            display: flex; flex-direction: column; align-items: center; gap: 0.35rem; padding: 0.85rem 0.5rem;
            border: 2px solid var(--border, #e5e7eb); border-radius: 10px; cursor: pointer;
            font-size: 0.78rem; text-align: center; transition: all .15s; background: var(--bg-primary, #fff);
        }
        .rm-condition-option:hover { border-color: var(--primary, #1a4731); }
        .rm-condition-option.selected { border-color: var(--primary, #1a4731); background: rgba(26,71,49,0.04); font-weight: 600; }
        .rm-condition-option i { font-size: 1.3rem; color: var(--text-light); transition: color .15s; }
        .rm-condition-option.selected i { color: var(--primary, #1a4731); }
        .rm-condition-option input { display: none; }

        .rm-textarea {
            width: 100%; padding: 0.75rem; border: 2px solid var(--border, #e5e7eb); border-radius: 10px;
            font-size: 0.92rem; resize: vertical; min-height: 80px; font-family: inherit; transition: border-color .15s;
        }
        .rm-textarea:focus { outline: none; border-color: var(--primary, #1a4731); }

        .rm-section-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.6rem; color: var(--text-primary, #1e293b); }

        /* Summary */
        .rm-summary-card {
            background: var(--bg-secondary, #f8fafc); border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem;
            border: 1px solid var(--border, #e5e7eb);
        }
        .rm-summary-row { display: flex; justify-content: space-between; padding: 0.3rem 0; font-size: 0.88rem; }
        .rm-summary-row.total { font-weight: 700; border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 0.3rem; }

        /* Action Buttons */
        .rm-btn-return {
            padding: 0.6rem 1.25rem; border: none; border-radius: 10px; font-weight: 600; font-size: 0.9rem;
            cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; transition: all .15s;
            background: var(--primary, #1a4731); color: #fff;
        }
        .rm-btn-return:hover { opacity: 0.9; transform: translateY(-1px); }
        .rm-btn-return:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .rm-btn-discard {
            padding: 0.6rem 1.25rem; border: 2px solid var(--border, #e5e7eb); border-radius: 10px;
            font-weight: 600; font-size: 0.9rem; cursor: pointer; background: transparent;
            color: var(--text-primary); display: inline-flex; align-items: center; gap: 0.4rem; transition: all .15s;
        }
        .rm-btn-discard:hover { border-color: var(--error, #ef4444); color: var(--error, #ef4444); }

        @media (max-width: 500px) {
            .rm-reason-grid { grid-template-columns: 1fr; }
            .rm-condition-grid { grid-template-columns: 1fr 1fr; }
            .return-modal { border-radius: 16px 16px 0 0; max-height: 95vh; }
            .return-modal-overlay { align-items: flex-end; padding: 0; }
        }

        /* account dropdown styles moved to styles.css */
    </style>

    <script src="/js/main.js"></script>
    <script>
        let ordersRefreshInterval = null;
        let _ordersCache = [];

        function getCustomerOrderStatusText(status) {
            if (!status) return 'Order Pending';
            switch (status) {
                case 'pending':
                    return 'Order Pending';
                case 'processing':
                    return 'Order Confirmed';
                case 'shipped':
                    return 'Shipped';
                case 'delivered':
                    return 'Delivered';
                case 'cancelled':
                    return 'Rejected by owner';
                default:
                    return status;
            }
        }

        function getCustomerOrderStatusClass(status) {
            switch (status) {
                case 'pending':
                    return 'order-status-badge order-status-pending';
                case 'processing':
                    return 'order-status-badge order-status-processing';
                case 'shipped':
                    return 'order-status-badge order-status-shipped';
                case 'delivered':
                    return 'order-status-badge order-status-delivered';
                case 'cancelled':
                    return 'order-status-badge order-status-cancelled';
                default:
                    return 'order-status-badge';
            }
        }

        function getRefundDisplay(order) {
            const provider = String(order.payment_provider || '').toLowerCase();
            const paymentStatus = String(order.payment_status || '').toLowerCase();
            const refundStatus = String(order.refund_status || '').toLowerCase();

            if (provider !== 'razorpay') return '';

            if (refundStatus === 'refunded' || paymentStatus === 'refunded') {
                return '<span style="color: var(--success); font-weight: 700;">Refunded</span>';
            }

            if (refundStatus === 'refund_pending' || paymentStatus === 'refund_pending') {
                return '<span style="color: var(--warning); font-weight: 700;">Refund pending</span>';
            }

            if (refundStatus === 'refund_failed') {
                return '<span style="color: var(--error); font-weight: 700;">Refund failed (contact support)</span>';
            }

            if (paymentStatus === 'paid') {
                return '<span style="color: var(--info); font-weight: 700;">Paid</span>';
            }

            return '';
        }

        function canCustomerCancel(order) {
            const status = String(order.status || '').toLowerCase();
            return status === 'pending' || status === 'processing';
        }

        async function cancelOrder(orderId) {
            if (!orderId) return;
            const ok = await showConfirmDialog('Cancel this order? If it was paid by UPI/GPay, the refund will be initiated back to your bank account.', {
                title: 'Cancel Order',
                confirmText: 'Cancel Order',
                cancelText: 'Keep Order'
            });
            if (!ok) return;

            try {
                const resp = await api.post(`/orders/${orderId}/cancel`, { reason: 'Customer cancelled' });
                showAlert(resp.message || 'Order cancelled', 'success');
                await loadOrders();
            } catch (err) {
                console.error('Cancel order failed:', err);
                showAlert(err.message || 'Failed to cancel order', 'error');
            }
        }

        async function loadOrders() {
            const data = await api.get('/orders');
            _ordersCache = data.orders || [];
            const container = document.getElementById('orders-list');
            
            if (!data.orders || data.orders.length === 0) {
                container.innerHTML = '<div class="card"><div class="card-content text-center"><p>You have no orders yet</p><a href="/products" class="btn btn-primary mt-2">Start Shopping</a></div></div>';
                return;
            }
            
            container.innerHTML = data.orders.map(order => {
                // ── Delivery stepper ──
                const statusOrder = ['pending', 'processing', 'shipped', 'delivered'];
                const steps = [
                    { key: 'pending',    icon: 'fa-box',           label: 'Order Placed' },
                    { key: 'processing', icon: 'fa-check-circle',  label: 'Confirmed' },
                    { key: 'shipped',    icon: 'fa-shipping-fast', label: 'Shipped' },
                    { key: 'delivered',  icon: 'fa-home',          label: 'Delivered' },
                ];
                const isCancelled = order.status === 'cancelled';
                const currentIdx = statusOrder.indexOf(order.status);
                // Progress bar width: 0%, 33%, 66%, 100%
                const progressPct = isCancelled ? 0 : Math.max(0, (currentIdx / (steps.length - 1)) * 100);

                const stepperHtml = isCancelled ? '' : `
                    <div class="delivery-stepper" style="margin-top:1.25rem;">
                        <div class="ds-progress" style="width:calc(${progressPct}% - 36px + ${progressPct === 0 ? 18 : progressPct < 100 ? 18 : 18}px);left:18px;"></div>
                        ${steps.map((s, i) => {
                            const isDone   = currentIdx > i;
                            const isActive = currentIdx === i;
                            const cls = isDone ? 'done' : isActive ? 'active' : '';
                            return `<div class="ds-step ${cls}">
                                <div class="ds-step-icon"><i class="fas ${s.icon}"></i></div>
                                <span class="ds-step-label">${s.label}</span>
                            </div>`;
                        }).join('')}
                    </div>
                `;

                // ── Tracking card ──
                const hasTracking = order.tracking_number || order.courier_name;
                const isShippedOrDelivered = order.status === 'shipped' || order.status === 'delivered';
                let trackingHtml = '';
                if (isShippedOrDelivered && hasTracking) {
                    const etaText = order.estimated_delivery
                        ? new Date(order.estimated_delivery).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
                        : null;
                    trackingHtml = `
                        <div class="tracking-card">
                            <div class="tracking-card-icon"><i class="fas fa-truck"></i></div>
                            <div class="tracking-card-body">
                                <div class="tracking-card-label">Shipment Tracking</div>
                                ${order.courier_name ? `<div class="tracking-card-row">Carrier: <span>${order.courier_name}</span></div>` : ''}
                                ${order.tracking_number ? `<div class="tracking-card-row">Tracking #: <span>${order.tracking_number}</span></div>` : ''}
                                ${etaText ? `<div class="tracking-card-row">Est. Delivery: <span>${etaText}</span></div>` : ''}
                                ${order.tracking_url ? `<a href="${order.tracking_url}" target="_blank" rel="noopener noreferrer" class="tracking-card-link"><i class="fas fa-external-link-alt"></i> Track Shipment</a>` : ''}
                            </div>
                        </div>
                    `;
                }

                return `
                <div class="card">
                    <div class="card-content">
                        <div class="order-header" style="margin-bottom: 1rem;">
                            <div class="order-header-left">
                                <strong>Order #${order.order_number}</strong>
                                <p style="color: var(--text-light); margin-top: 0.25rem;">${formatDate(order.created_at)}</p>
                            </div>
                            <div class="order-header-right">
                                <span class="${getCustomerOrderStatusClass(order.status)}">${getCustomerOrderStatusText(order.status)}</span>
                                <p style="margin-top: 0.5rem; font-size: 1.25rem; font-weight: 700; color: var(--primary);">${formatCurrency(order.total_amount)}</p>
                            </div>
                        </div>

                        ${stepperHtml}

                        <div style="border-top: 1px solid var(--border); padding-top: 1rem; ${stepperHtml ? 'margin-top:1rem;' : ''}">
                            ${getRefundDisplay(order) ? `
                                <p style="margin: 0 0 0.75rem; color: var(--text-light);">
                                    Payment/Refund: ${getRefundDisplay(order)}
                                </p>
                            ` : ''}
                            <strong style="display: block; margin-bottom: 0.5rem;">Items:</strong>
                            ${order.items.map(item => `<div style="display: flex; justify-content: space-between; padding: 0.5rem 0;"><span>${item.product_name} x ${item.quantity}</span><span>${formatCurrency(item.subtotal)}</span></div>`).join('')}

                            ${trackingHtml}

                            ${(canCustomerCancel(order) || order.status === 'delivered' || order.status === 'shipped') ? `
                                <div style="margin-top: 1rem; display:flex; justify-content:flex-end; gap:0.5rem; flex-wrap:wrap;">
                                    ${canCustomerCancel(order) ? `
                                        <button class="btn btn-danger btn-sm" onclick="cancelOrder(${order.id})">
                                            <i class="fas fa-times"></i> Cancel Order
                                        </button>
                                    ` : ''}
                                    ${(order.status === 'delivered' || order.status === 'shipped') ? `
                                        ${order.return_status ? `
                                            <span style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.35rem 0.75rem;border-radius:4px;font-size:0.85rem;font-weight:600;background:${order.return_status === 'refunded' ? 'var(--success, #28a745)' : order.return_status === 'rejected' ? 'var(--danger, #dc3545)' : 'var(--warning, #ffc107)'};color:${order.return_status === 'requested' || order.return_status === 'approved' ? '#212529' : '#fff'};">
                                                <i class="fas fa-undo-alt"></i> Return ${order.return_status.charAt(0).toUpperCase() + order.return_status.slice(1)}
                                            </span>
                                        ` : `
                                            <button class="btn btn-secondary btn-sm" onclick="openReturnModal(${order.id})" style="border-color:var(--warning);color:var(--warning);">
                                                <i class="fas fa-undo-alt"></i> Return
                                            </button>
                                        `}
                                    ` : ''}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // ── Return Products — Multi-Step Modal ──────────────────
        const RETURN_REASONS = [
            { id: 'wrong_item', icon: 'fa-exchange-alt', label: 'Wrong Item Received' },
            { id: 'damaged', icon: 'fa-box-open', label: 'Damaged / Broken' },
            { id: 'not_as_described', icon: 'fa-image', label: 'Not as Described' },
            { id: 'quality_issue', icon: 'fa-thumbs-down', label: 'Quality Issue' },
            { id: 'expired', icon: 'fa-calendar-times', label: 'Expired Product' },
            { id: 'changed_mind', icon: 'fa-heart-broken', label: 'Changed My Mind' },
        ];

        const PRODUCT_CONDITIONS = [
            { id: 'unopened', icon: 'fa-box', label: 'Unopened / Sealed' },
            { id: 'opened', icon: 'fa-box-open', label: 'Opened' },
            { id: 'damaged', icon: 'fa-bolt', label: 'Damaged' },
        ];

        let _returnStep = 1;
        let _returnOrderId = null;

        function openReturnModal(orderId) {
            const order = _ordersCache.find(o => o.id === orderId);
            if (!order || (order.status !== 'delivered' && order.status !== 'shipped')) return;
            _returnOrderId = orderId;
            _returnStep = 1;

            const items = order.items || [];
            const itemsHtml = items.map(item => `
                <label class="return-item-check" onclick="this.classList.toggle('selected', this.querySelector('input').checked)">
                    <input type="checkbox" class="return-item-cb" data-order-item-id="${item.id}" data-product-name="${item.product_name}" data-quantity="${item.quantity}" data-price="${item.price || item.subtotal / item.quantity}" data-subtotal="${item.subtotal}" checked onchange="this.closest('.return-item-check').classList.toggle('selected', this.checked); updateReturnSummary();">
                    <div style="flex:1;">
                        <div style="font-weight:600;font-size:0.92rem;">${item.product_name}</div>
                        <div style="color:var(--text-light);font-size:0.82rem;">Qty: ${item.quantity} &times; ${formatCurrency(item.price || item.subtotal / item.quantity)}</div>
                    </div>
                    <span style="font-weight:700;color:var(--primary);">${formatCurrency(item.subtotal)}</span>
                </label>
            `).join('');

            const reasonsHtml = RETURN_REASONS.map(r => `
                <label class="rm-reason-option" onclick="selectReason(this)">
                    <input type="radio" name="return-reason" value="${r.id}">
                    <i class="fas ${r.icon}"></i>
                    <span>${r.label}</span>
                </label>
            `).join('');

            const conditionsHtml = PRODUCT_CONDITIONS.map(c => `
                <label class="rm-condition-option" onclick="selectCondition(this)">
                    <input type="radio" name="return-condition" value="${c.id}">
                    <i class="fas ${c.icon}"></i>
                    <span>${c.label}</span>
                </label>
            `).join('');

            const modal = document.createElement('div');
            modal.className = 'return-modal-overlay';
            modal.id = 'return-modal';
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="return-modal">
                    <div class="return-modal-header">
                        <h3><i class="fas fa-undo-alt" style="color:var(--warning);"></i> Return Request</h3>
                        <button class="return-modal-close" onclick="document.getElementById('return-modal').remove()">&times;</button>
                    </div>
                    <div class="return-modal-body">
                        <p style="margin:0 0 1rem;color:var(--text-light);font-size:0.88rem;">Order <strong>#${order.order_number}</strong> &bull; ${formatDate(order.created_at)}</p>

                        <!-- Stepper -->
                        <div class="rm-stepper">
                            <div class="rm-step active" id="rm-step-1"><span class="rm-step-num">1</span> Items</div>
                            <div class="rm-step-line" id="rm-line-1"></div>
                            <div class="rm-step" id="rm-step-2"><span class="rm-step-num">2</span> Reason</div>
                            <div class="rm-step-line" id="rm-line-2"></div>
                            <div class="rm-step" id="rm-step-3"><span class="rm-step-num">3</span> Review</div>
                        </div>

                        <!-- Step 1: Select Items -->
                        <div id="rm-page-1">
                            <div class="rm-section-title">Which items do you want to return?</div>
                            <div id="return-items-list">${itemsHtml}</div>
                        </div>

                        <!-- Step 2: Reason & Condition -->
                        <div id="rm-page-2" style="display:none;">
                            <div class="rm-section-title">Why are you returning?</div>
                            <div class="rm-reason-grid">${reasonsHtml}</div>

                            <div class="rm-section-title">What is the product condition?</div>
                            <div class="rm-condition-grid">${conditionsHtml}</div>

                            <div class="rm-section-title">Additional details <span style="font-weight:400;color:var(--text-light);font-size:0.8rem;">(optional)</span></div>
                            <textarea class="rm-textarea" id="return-details" placeholder="Tell us more about what happened — any extra details help us process your return faster..."></textarea>
                        </div>

                        <!-- Step 3: Review & Confirm -->
                        <div id="rm-page-3" style="display:none;">
                            <div class="rm-section-title">Review Your Return</div>
                            <div class="rm-summary-card" id="rm-summary-items"></div>
                            <div class="rm-summary-card" id="rm-summary-reason"></div>
                            <div style="padding:0.6rem 0;font-size:0.85rem;color:var(--text-light);">
                                <i class="fas fa-info-circle" style="color:var(--info);"></i>
                                Once submitted, our team will review your request within 24–48 hours. You'll be notified of any updates.
                            </div>
                        </div>
                    </div>
                    <div class="return-modal-footer">
                        <button class="rm-btn-discard" id="rm-btn-back" onclick="returnStepBack()" style="display:none;">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <div style="flex:1;"></div>
                        <button class="rm-btn-discard" onclick="document.getElementById('return-modal').remove()">
                            <i class="fas fa-times"></i> Discard
                        </button>
                        <button class="rm-btn-return" id="rm-btn-next" onclick="returnStepNext()">
                            Next <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Auto-select all items
            document.querySelectorAll('.return-item-check').forEach(el => el.classList.add('selected'));
        }

        function selectReason(el) {
            document.querySelectorAll('.rm-reason-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        function selectCondition(el) {
            document.querySelectorAll('.rm-condition-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        function updateReturnSummary() {
            const checked = document.querySelectorAll('.return-item-cb:checked');
            let totalRefund = 0;
            let itemsHtml = '';
            checked.forEach(cb => {
                const name = cb.dataset.productName;
                const qty = parseInt(cb.dataset.quantity);
                const subtotal = parseFloat(cb.dataset.subtotal);
                totalRefund += subtotal;
                itemsHtml += `<div class="rm-summary-row"><span>${name} &times; ${qty}</span><span>${formatCurrency(subtotal)}</span></div>`;
            });
            itemsHtml += `<div class="rm-summary-row total"><span>Estimated Refund</span><span style="color:var(--success);">${formatCurrency(totalRefund)}</span></div>`;

            const summaryItems = document.getElementById('rm-summary-items');
            if (summaryItems) summaryItems.innerHTML = itemsHtml;

            const reasonEl = document.querySelector('input[name="return-reason"]:checked');
            const conditionEl = document.querySelector('input[name="return-condition"]:checked');
            const details = (document.getElementById('return-details')?.value || '').trim();

            const reasonLabel = reasonEl ? RETURN_REASONS.find(r => r.id === reasonEl.value)?.label : '—';
            const conditionLabel = conditionEl ? PRODUCT_CONDITIONS.find(c => c.id === conditionEl.value)?.label : '—';

            const summaryReason = document.getElementById('rm-summary-reason');
            if (summaryReason) {
                summaryReason.innerHTML = `
                    <div class="rm-summary-row"><span style="color:var(--text-light);">Reason</span><span style="font-weight:600;">${reasonLabel}</span></div>
                    <div class="rm-summary-row"><span style="color:var(--text-light);">Condition</span><span style="font-weight:600;">${conditionLabel}</span></div>
                    ${details ? `<div style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border);font-size:0.85rem;color:var(--text-light);"><strong>Details:</strong> ${details}</div>` : ''}
                `;
            }
        }

        function setReturnStep(step) {
            _returnStep = step;
            for (let i = 1; i <= 3; i++) {
                const page = document.getElementById(`rm-page-${i}`);
                const stepEl = document.getElementById(`rm-step-${i}`);
                if (page) page.style.display = i === step ? 'block' : 'none';
                if (stepEl) {
                    stepEl.classList.remove('active', 'done');
                    if (i < step) stepEl.classList.add('done');
                    else if (i === step) stepEl.classList.add('active');
                }
                if (i < 3) {
                    const line = document.getElementById(`rm-line-${i}`);
                    if (line) { line.classList.toggle('done', i < step); }
                }
            }

            const backBtn = document.getElementById('rm-btn-back');
            const nextBtn = document.getElementById('rm-btn-next');
            if (backBtn) backBtn.style.display = step > 1 ? '' : 'none';
            if (nextBtn) {
                if (step === 3) {
                    nextBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Return';
                    nextBtn.onclick = submitReturnRequest;
                } else {
                    nextBtn.innerHTML = 'Next <i class="fas fa-arrow-right"></i>';
                    nextBtn.onclick = returnStepNext;
                }
            }
        }

        function returnStepNext() {
            if (_returnStep === 1) {
                const checked = document.querySelectorAll('.return-item-cb:checked');
                if (!checked.length) { showAlert('Please select at least one item to return.', 'error'); return; }
                setReturnStep(2);
            } else if (_returnStep === 2) {
                const reason = document.querySelector('input[name="return-reason"]:checked');
                if (!reason) { showAlert('Please select a reason for the return.', 'error'); return; }
                const condition = document.querySelector('input[name="return-condition"]:checked');
                if (!condition) { showAlert('Please select the product condition.', 'error'); return; }
                updateReturnSummary();
                setReturnStep(3);
            }
        }

        function returnStepBack() {
            if (_returnStep > 1) setReturnStep(_returnStep - 1);
        }

        async function submitReturnRequest() {
            const reasonEl = document.querySelector('input[name="return-reason"]:checked');
            const conditionEl = document.querySelector('input[name="return-condition"]:checked');
            const details = (document.getElementById('return-details')?.value || '').trim();

            const reasonLabel = RETURN_REASONS.find(r => r.id === reasonEl.value)?.label || reasonEl.value;
            const conditionLabel = PRODUCT_CONDITIONS.find(c => c.id === conditionEl.value)?.label || conditionEl.value;

            let reason = `Reason: ${reasonLabel}. Condition: ${conditionLabel}.`;
            if (details) reason += ` Details: ${details}`;

            const checkboxes = document.querySelectorAll('.return-item-cb:checked');
            const items = [];
            checkboxes.forEach(cb => {
                items.push({
                    order_item_id: parseInt(cb.dataset.orderItemId),
                    quantity: parseInt(cb.dataset.quantity)
                });
            });

            const btn = document.getElementById('rm-btn-next');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...'; }

            try {
                const resp = await api.post('/returns', { order_id: _returnOrderId, reason, items });
                showAlert(resp.message || 'Return request submitted successfully!', 'success');
                const modal = document.getElementById('return-modal');
                if (modal) modal.remove();
                setTimeout(() => { window.location.href = '/returns'; }, 1500);
            } catch (err) {
                showAlert(err.message || 'Failed to submit return request.', 'error');
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Return'; }
            }
        }

        // ──────────────────────────────────────────

        function startOrdersAutoRefresh() {
            if (ordersRefreshInterval) return;

            const refreshDelay = window.performanceTuning
                ? window.performanceTuning.getAdaptiveInterval(15000, {
                    lowMultiplier: 2,
                    highMultiplier: 0.75,
                    min: 10000,
                    max: 45000
                })
                : 15000;

            ordersRefreshInterval = setInterval(() => {
                loadOrders().catch(err => console.error('Auto-refresh orders error:', err));
            }, refreshDelay);
        }

        window.addEventListener('beforeunload', () => {
            if (ordersRefreshInterval) {
                clearInterval(ordersRefreshInterval);
                ordersRefreshInterval = null;
            }
        });

        (async () => {
            const user = await auth.checkAuth();

            if (!user) {
                const redirect = encodeURIComponent('/orders');
                window.location.href = `/login?redirect=${redirect}`;
            } else {
                await loadOrders();
                startOrdersAutoRefresh();
            }

            // Account dropdown toggle
            const accountToggle = document.getElementById('account-toggle');
            const accountDropdown = document.getElementById('account-dropdown');

            if (accountToggle && accountDropdown) {
                accountToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    accountDropdown.classList.toggle('hidden');
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.account-menu')) {
                        accountDropdown.classList.add('hidden');
                    }
                });
            }

            // Account logout handler
            const accountLogout = document.getElementById('account-logout');
            if (accountLogout) {
                accountLogout.addEventListener('click', async () => {
                    if (await showConfirmDialog('Are you sure you want to logout?', { title: 'Logout', confirmText: 'Logout' })) {
                        await auth.logout();
                    }
                });
            }
        })();
    </script>
</body>
</html>
