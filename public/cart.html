<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/mobile-enhancements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <span class="nav-corner nav-corner-tl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-tr" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-bl" aria-hidden="true"></span>
        <span class="nav-corner nav-corner-br" aria-hidden="true"></span>
        <div class="navbar-container">
            <button class="mobile-menu-toggle" aria-label="Open navigation menu">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="navbar-brand">
                <span class="navbar-tagline">GOURMET GROCERIES</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Products</a></li>
            </ul>
            <div class="navbar-actions">
                <div id="auth-buttons"><a href="/login" class="btn btn-secondary btn-sm">Login</a></div>
                <div id="user-menu" class="hidden flex gap-2" style="align-items: center;">
                    <a href="/cart" class="icon-button"><i class="fas fa-shopping-cart"></i><span id="cart-badge" class="cart-badge hidden">0</span></a>
                    <div class="account-menu">
                        <button id="account-toggle" class="icon-button" title="Account">
                            <i class="fas fa-user-circle"></i>
                        </button>
                                                <div id="account-dropdown" class="account-dropdown hidden">
                            <div class="accd-header">
                                <div class="accd-avatar" id="account-avatar">U</div>
                                <div class="accd-user">
                                    <div class="accd-name" id="account-display-name">User</div>
                                    <div class="accd-role" id="account-display-role">Member</div>
                                </div>
                            </div>
                            <div class="accd-group">
                                <button class="accd-item" onclick="openProfileModal()">
                                    <span class="accd-icon"><i class="fas fa-user-edit"></i></span>Edit Profile
                                </button>
                                <a href="/orders" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-box-open"></i></span>My Orders
                                </a>
                                <a href="/returns" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-undo-alt"></i></span>My Returns
                                </a>
                                <a href="/addresses" class="accd-item accd-desktop-only">
                                    <span class="accd-icon"><i class="fas fa-map-marker-alt"></i></span>Manage Address
                                </a>
                                <button class="accd-item" onclick="openAccountManagementModal()">
                                    <span class="accd-icon"><i class="fas fa-key"></i></span>Change Password
                                </button>
                            </div>
                            <div class="accd-group">
                                <button id="theme-toggle" class="accd-item">
                                    <span class="accd-icon"><i class="fas fa-moon"></i></span>Switch to Dark Mode
                                </button>
                            </div>
                            <div class="accd-group accd-group-last">
                                <button id="account-logout" class="accd-item accd-item-danger">
                                    <span class="accd-icon"><i class="fas fa-sign-out-alt"></i></span>Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="cart-main-section">
        <div class="section-title">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <h2>Shopping Cart</h2>
            </div>
        </div>
        <div class="cart-flex-grid">
            <div id="cart-items"></div>
            <div class="card order-summary">
                <div class="card-content">
                    <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
                        <span>Subtotal:</span><strong id="cart-subtotal">₹0.00</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 1.25rem;">
                        <strong>Total:</strong><strong id="cart-total" style="color: var(--primary);">₹0.00</strong>
                    </div>
                    <button id="checkout-btn" onclick="proceedToCheckout()" class="btn btn-primary" style="width: 100%;"><i class="fas fa-credit-card"></i> Proceed to Checkout</button>
                    <a href="/products" id="continue-shopping-link" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;"><i class="fas fa-store"></i> Continue Shopping</a>
                </div>
            </div>
        </div>
    </section>
    <style>
    .cart-main-section {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 2rem 0;
    }
    .cart-flex-grid {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        align-items: stretch;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
    }
    .order-summary {
        max-width: 400px;
        width: 100%;
        margin: 0 auto;
    }
    .card-content {
        padding: 2rem;
    }
    .card img {
        width: 100%;
        max-width: 100px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
        display: block;
        margin: 0 auto;
    }
    .cart-item-row {
        display: flex;
        flex-direction: row;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
    }
    .cart-item-details {
        flex: 1 1 120px;
        min-width: 0;
    }
    .cart-item-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    .cart-item-price {
        min-width: 80px;
        text-align: right;
        font-size: 1.1rem;
        color: var(--primary-700);
    }
    @media (min-width: 900px) {
        .cart-flex-grid {
            flex-direction: row;
            gap: 2rem;
            align-items: flex-start;
        }
        #cart-items {
            flex: 2 1 0%;
        }
        .order-summary {
            flex: 1 1 350px;
            max-width: 400px;
            margin: 0;
        }
    }
    @media (max-width: 768px) {
        .cart-item-row {
            flex-direction: column;
            align-items: flex-start;
        }
        .cart-item-price {
            width: 100%;
            text-align: left;
            margin-top: 0.5rem;
        }
        .card img {
            max-width: 120px;
            height: auto;
        }
    }
    @media (max-width: 600px) {
        .card-content { padding: 0.7rem !important; }
        .btn { font-size: 0.9rem; padding: 0.5rem 0.7rem; }
        .cart-item-price { font-size: 1rem; }
        .cart-main-section { padding: 1.5rem 1rem; }
    }

    /* account dropdown styles moved to styles.css */
    </style>
    <script src="/js/main.js"></script>
    <script>
        // Navigate back to appropriate home based on user role
        function navigateBack() {
            const homeUrl = auth.getHomeUrl ? auth.getHomeUrl() : '/';
            window.location.href = homeUrl;
        }

        async function loadCart() {
        const data = await cart.fetch();
        const container = document.getElementById('cart-items');
        if (!data || !data.cartItems || data.cartItems.length === 0) {
            container.innerHTML = '<div class="card"><div class="card-content text-center"><p>Your cart is empty</p><a href="/products" class="btn btn-primary mt-2" data-continue-shopping>Start Shopping</a></div></div>';
            document.getElementById('cart-subtotal').textContent = '₹0.00';
            document.getElementById('cart-total').textContent = '₹0.00';
            updateCartShoppingLinks();
            return;
        }
        const isWholesaleUser = !!(auth && typeof auth.isWholesale === 'function' && auth.isWholesale());

        container.innerHTML = data.cartItems.map(function(item) {
            const priceBlock = (() => {
                const base = item.original_price != null ? parseFloat(item.original_price) : null;
                const sale = item.price != null ? parseFloat(item.price) : null;
                const showDiscount = base != null && sale != null && sale < base;
                if (showDiscount) {
                    return `<span style="text-decoration: line-through; color: #d14343; font-size: 0.9em; margin-right: 6px;">${formatCurrency(base)}</span><span style="color: var(--primary); font-weight: 700;">${formatCurrency(sale)}</span>`;
                }
                return formatCurrency(sale ?? 0);
            })();

            const minQty = (() => {
                if (!isWholesaleUser) return 1;
                const raw = parseInt(item.min_wholesale_qty || 10, 10);
                return Number.isFinite(raw) && raw > 0 ? raw : 10;
            })();

            return `
            <div class="card" style="margin-bottom: 1rem; max-width: 700px; margin-left: auto; margin-right: auto;">
                <div class="card-content cart-item-row">
                    <img src="${item.image_url || '/images/placeholder.jpg'}" alt="${item.name}">
                    <div class="cart-item-details">
                        <h4 style="margin-bottom: 0.5rem;">${item.name}</h4>
                        <p style="color: var(--text-light); margin-bottom: 0.5rem;">${priceBlock} each</p>
                        <div class="cart-item-actions">
                            <input type="number" value="${item.quantity}" min="${minQty}" step="${minQty}" max="${item.stock_quantity}" 
                                   onchange="updateQuantity(${item.id}, this.value, ${minQty}, ${item.stock_quantity})" 
                                   style="width: 70px; padding: 0.4rem; border: 2px solid var(--border); border-radius: 6px;">
                            <button onclick="cart.remove(${item.id}); loadCart();" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                    <div class="cart-item-price"><strong>${formatCurrency(item.subtotal)}</strong></div>
                </div>
            </div>
            `;
        }).join('');
        document.getElementById('cart-subtotal').textContent = formatCurrency(data.total);
        document.getElementById('cart-total').textContent = formatCurrency(data.total);
    }

    function updateCartShoppingLinks() {
        const target = auth.isWholesale && auth.isWholesale() ? '/wholesale#catalog' : '/products';
        document.querySelectorAll('#continue-shopping-link, [data-continue-shopping]').forEach(link => {
            link.setAttribute('href', target);
        });
    }

    async function updateQuantity(itemId, quantity, minQty = 1, maxQty = Infinity) {
        const parsedMin = parseInt(minQty, 10);
        const step = Number.isFinite(parsedMin) && parsedMin > 0 ? parsedMin : 1;

        let q = parseInt(quantity, 10);
        if (!Number.isFinite(q) || q <= 0) q = step;

        q = Math.max(step, q);

        const maxParsed = parseInt(maxQty, 10);
        const hasMax = Number.isFinite(maxParsed) && maxParsed > 0;
        if (hasMax) {
            q = Math.min(q, maxParsed);
        }

        if (hasMax && maxParsed < step) {
            await cart.update(itemId, maxParsed);
            loadCart();
            return;
        }

        if (step > 1) {
            q = Math.ceil(q / step) * step;
            if (hasMax && q > maxParsed) {
                q = Math.floor(maxParsed / step) * step;
            }
            q = Math.max(step, q);
        }

        await cart.update(itemId, q);
        loadCart();
    }

    async function proceedToCheckout() {
        try {
            // Check if user is authenticated
            const user = await auth.checkAuth();
            
            if (!user) {
                // Redirect to login with return URL
                showAlert('Please login to proceed to checkout', 'info');
                setTimeout(() => {
                    window.location.href = '/login?redirect=/checkout';
                }, 1000);
                return;
            }
            
            // Check if cart has items
            const cartData = await cart.fetch();
            if (!cartData || !cartData.cartItems || cartData.cartItems.length === 0) {
                showAlert('Your cart is empty', 'warning');
                return;
            }
            
            // Proceed to checkout
            window.location.href = '/checkout';
            
        } catch (error) {
            console.error('Checkout error:', error);
            showAlert('Please login to proceed to checkout', 'info');
            setTimeout(() => {
                window.location.href = '/login?redirect=/checkout';
            }, 1000);
        }
    }

    (async function() {
        try {
            await auth.checkAuth();
            // Update navigation links for user role
            auth.updateNavigationLinks();
            updateCartShoppingLinks();
        } catch (err) {
            console.warn('Auth check failed on cart page:', err);
        }
        // Regardless of auth result, try to load the cart; backend will protect APIs
        await loadCart();

        // Account dropdown toggle
        const accountToggle = document.getElementById('account-toggle');
        const accountDropdown = document.getElementById('account-dropdown');

        if (accountToggle && accountDropdown) {
            accountToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                accountDropdown.classList.toggle('hidden');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.account-menu')) {
                    accountDropdown.classList.add('hidden');
                }
            });
        }

        // Account logout handler
        const accountLogout = document.getElementById('account-logout');
        if (accountLogout) {
            accountLogout.addEventListener('click', async () => {
                if (await showConfirmDialog('Are you sure you want to logout?', { title: 'Logout', confirmText: 'Logout' })) {
                    await auth.logout();
                }
            });
        }
    })();
    </script>
</body>
</html>
